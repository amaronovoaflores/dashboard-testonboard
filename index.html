<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Flotas</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0d1b2a;color:#9ab8b0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;}
  .ld{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#FAC775;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="ld"><div class="dot"></div><div id="ld-txt">Cargando…</div></div>
<script>
// Este archivo es un loader liviano: el dashboard real vive en un solo repo
// compartido (dashboard-app) para que un fix o mejora aplique a todos los
// clientes sin copiar el archivo completo a cada repo. No editar esto por
// cliente — si necesitas cambiar algo del dashboard en si, es en dashboard-app.
var APP_USER = 'amaronovoaflores';
var APP_REPO = 'dashboard-app';
var APP_FILE = 'app.html';
var APP_URL = 'https://raw.githubusercontent.com/' + APP_USER + '/' + APP_REPO + '/main/' + APP_FILE + '?t=' + Date.now();

fetch(APP_URL)
  .then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
  .then(function(html){
    document.open();
    document.write(html);
    document.close();
  })
  .catch(function(err){
    document.getElementById('ld-txt').textContent = 'No se pudo cargar el dashboard. Intenta recargar la pagina.';
    console.error('Error cargando dashboard-app:', err);
  });
</script>
</body>
</html>
